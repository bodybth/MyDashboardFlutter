name: Build & Release APK

on:
  push:
    branches: [ "main" ]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: { distribution: temurin, java-version: '17' }
      - uses: subosito/flutter-action@v2
        with: { flutter-version: '3.19.6', channel: stable }
      - run: flutter pub get
      - run: flutter build apk --release --no-tree-shake-icons
      - run: |
          DATE=$(date +'%Y-%m-%d')
          cp build/app/outputs/flutter-apk/app-release.apk dashboard-$DATE.apk
      - uses: actions/upload-artifact@v4
        with: { name: dashboard-apk, path: dashboard-*.apk }
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: Dashboard v${{ github.run_number }}
          body: |
            **Changes:** ${{ github.event.head_commit.message }}
            ### Install
            1. Download `dashboard-*.apk` below
            2. Open on your Android phone — allow unknown sources
          files: dashboard-*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
