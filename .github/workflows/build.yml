name: Build & Release APK

on:
  push:
    branches: [ "main" ]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.6'
          channel: stable

      - run: flutter pub get

      # Auto-bump versionCode to github.run_number so each APK is recognized
      # as a newer version by Android and installs as an UPDATE (not fresh install)
      - name: Set versionCode from run number
        run: |
          sed -i "s/versionCode [0-9]*/versionCode ${{ github.run_number }}/" android/app/build.gradle
          sed -i "s/versionName \".*\"/versionName \"1.3.${{ github.run_number }}\"/" android/app/build.gradle
          echo "--- build.gradle version ---"
          grep -E "versionCode|versionName" android/app/build.gradle

      - run: flutter build apk --release --no-tree-shake-icons

      - name: Rename APK
        run: |
          DATE=$(date +'%Y-%m-%d')
          cp build/app/outputs/flutter-apk/app-release.apk "dashboard-v1.3.${{ github.run_number }}-$DATE.apk"

      - uses: actions/upload-artifact@v4
        with:
          name: dashboard-apk
          path: dashboard-*.apk

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.3.${{ github.run_number }}
          name: "Dashboard v1.3.${{ github.run_number }}"
          body: |
            **Changes:** ${{ github.event.head_commit.message }}

            ### ✅ Install as Update
            This APK uses the same App ID (`com.bodybth.mydashboard`) as previous builds.
            Android will install it **as an update** — your data is preserved.

            ### 📲 How to install
            1. Download `dashboard-v1.3.${{ github.run_number }}-*.apk` below
            2. Open it on your Android phone
            3. Tap **Update** (if already installed) or **Install**
          files: dashboard-*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
