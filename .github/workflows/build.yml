name: Build & Release APK

on:
  push:
    branches: [ "main" ]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.6'
          channel: stable

      - run: flutter pub get

      # ── Version scheme ───────────────────────────────────────────
      # versionCode = YYMMDDRRR  (9 digits, always fits Android 32-bit signed int)
      #   e.g. run 29 on 2025-02-27 → 250227029
      #   Max ever: 991231999 < 2,147,483,647 ✓
      #
      # pubspec format:  1.0.0+YYMMDDRRR
      #   Flutter maps the +N part → versionCode in build.gradle
      #   package_info_plus reads it back as .buildNumber at runtime
      #
      # GitHub tag: vYYMMDDRRR  → app strips 'v', parses as int, compares with buildNumber
      # ─────────────────────────────────────────────────────────────
      - name: Compute version
        run: |
          YY=$(date +'%y')
          MM=$(date +'%m')
          DD=$(date +'%d')
          RRR=$(printf '%03d' ${{ github.run_number }})
          CODE="${YY}${MM}${DD}${RRR}"
          echo "VERSION_CODE=${CODE}" >> $GITHUB_ENV
          echo "Computed versionCode: ${CODE}"
          python3 -c "v=${CODE}; print('Fits 32-bit ✅' if v < 2147483647 else 'OVERFLOW ❌')"

      - name: Patch pubspec.yaml
        run: |
          sed -i "s/^version: .*/version: 1.0.0+${{ env.VERSION_CODE }}/" pubspec.yaml
          echo "pubspec: $(grep '^version:' pubspec.yaml)"

      - name: Patch build.gradle
        run: |
          sed -i "s/versionCode [0-9]*/versionCode ${{ env.VERSION_CODE }}/" android/app/build.gradle
          sed -i "s/versionName \"[^\"]*\"/versionName \"${{ env.VERSION_CODE }}\"/" android/app/build.gradle
          echo "=== build.gradle ==="
          grep -E "versionCode|versionName" android/app/build.gradle
      - name: Generate release keystore
        run: |
          keytool -genkey -v \
            -keystore keystore.jks \
            -alias mydashboard \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass "${{ secrets.STORE_PASSWORD }}" \
            -keypass "${{ secrets.KEY_PASSWORD }}" \
            -dname "CN=My Dashboard, OU=App, O=bodybth, L=Unknown, S=Unknown, C=US"
          echo "KEYSTORE_PATH=${{ github.workspace }}/keystore.jks" >> $GITHUB_ENV
          echo "KEY_ALIAS=mydashboard" >> $GITHUB_ENV
          echo "KEY_PASSWORD=${{ secrets.KEY_PASSWORD }}" >> $GITHUB_ENV
          echo "STORE_PASSWORD=${{ secrets.STORE_PASSWORD }}" >> $GITHUB_ENV
      - run: flutter build apk --release --no-tree-shake-icons --target-platform android-arm,android-arm64

      - name: Rename APK
        run: cp build/app/outputs/flutter-apk/app-release.apk "dashboard-v${{ env.VERSION_CODE }}.apk"

      - uses: actions/upload-artifact@v4
        with:
          name: dashboard-apk
          path: dashboard-*.apk

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ env.VERSION_CODE }}
          name: "Dashboard v${{ env.VERSION_CODE }}"
          body: |
            **Commit:** ${{ github.event.head_commit.message }}
            **versionCode:** `${{ env.VERSION_CODE }}`
            **App ID:** `com.bodybth.mydashboard`

            ### ✅ Installs as Update
            versionCode `${{ env.VERSION_CODE }}` is higher than all previous builds.
            Android shows **Update** — your data is preserved.

            ### 📲 How to install
            1. Download `dashboard-v${{ env.VERSION_CODE }}.apk`
            2. Open it on your phone → tap **Update**
          files: dashboard-*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
